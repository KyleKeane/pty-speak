name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always() && hashFiles('**/test-results.trx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Publish Terminal.App for Velopack pack smoke
        # No --no-restore: a win-x64 self-contained publish needs a
        # RID-specific restore that the earlier platform-default
        # restore step doesn't produce.
        run: dotnet publish src/Terminal.App/Terminal.App.fsproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      - name: Velopack pack smoke
        run: |
          vpk pack `
            --packId pty-speak `
            --packTitle "pty-speak" `
            --packAuthors "pty-speak contributors" `
            --packVersion "0.0.1-ci.${{ github.run_number }}" `
            --packDir publish `
            --mainExe Terminal.App.exe `
            --outputDir releases

      - name: Upload Velopack smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-smoke-${{ github.run_number }}
          path: releases/
          retention-days: 7

  docs-lint:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Informational only — link checks legitimately flake on network
    # and third-party rate limits. Each step uses
    # `continue-on-error: true` so the job stays green and the report
    # is purely advisory; review it periodically rather than blocking
    # PRs on it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Restrict to docs we author (root + docs/). spec/ contains
      # reference citations to academic and vendor sources that we
      # treat as immutable; we do not want to gate PRs on those URLs
      # being reachable from an unauthenticated runner.
      - name: Lint Markdown links (docs/)
        continue-on-error: true
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc-config.json'
          folder-path: 'docs'
          max-depth: 2

      - name: Lint Markdown links (root)
        continue-on-error: true
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc-config.json'
          file-path: './README.md, ./CONTRIBUTING.md, ./SECURITY.md, ./CODE_OF_CONDUCT.md, ./CHANGELOG.md'
