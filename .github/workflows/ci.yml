name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always() && hashFiles('**/test-results.trx') != ''
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Publish Terminal.App for Velopack pack smoke
        # No --no-restore: a win-x64 self-contained publish needs a
        # RID-specific restore that the earlier platform-default
        # restore step doesn't produce.
        run: dotnet publish src/Terminal.App/Terminal.App.fsproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Cache Velopack CLI (vpk) global install
        # Audit-cycle PR-E. Caches `~/.dotnet/tools` so the
        # Velopack CLI doesn't re-download (~10s saved) on
        # every run. Cache key is statically versioned (`v1`)
        # rather than tied to a specific vpk version because
        # `dotnet tool install -g vpk` (no --version) installs
        # latest — the cache lives until vpk has a release we
        # actually want to pull, at which point bump v1 → v2.
        # PATH already includes ~/.dotnet/tools (setup-dotnet
        # puts it there) so cached or fresh, `vpk` is callable.
        id: cache-vpk
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-vpk-v1

      - name: Install Velopack CLI (vpk)
        if: steps.cache-vpk.outputs.cache-hit != 'true'
        run: dotnet tool install -g vpk

      - name: Velopack pack smoke
        run: |
          vpk pack `
            --packId pty-speak `
            --packTitle "pty-speak" `
            --packAuthors "pty-speak contributors" `
            --packVersion "0.0.1-ci.${{ github.run_number }}" `
            --packDir publish `
            --mainExe Terminal.App.exe `
            --outputDir releases

      - name: Upload Velopack smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: velopack-smoke-${{ github.run_number }}
          path: releases/
          retention-days: 7

  portability-lint:
    name: Portability lint (substrate / channel boundary)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Cycle 31a (2026-05-09): enforces ADR 0001 substrate / channel
    # dichotomy at CI gate. Substrate code in `Terminal.Core` and
    # `Terminal.Audio` MUST NOT import host-specific types
    # (`System.Windows.*`, `PresentationCore`, `WindowsBase`,
    # `Microsoft.Win32`) — those belong on the channel side
    # (`Terminal.Accessibility` and the host process).
    #
    # The grep is anchored on `^[[:space:]]*open[[:space:]]+`
    # so doc-comment mentions of these namespaces (e.g.,
    # `KeyEncoding.fs:11` "Why a private DU instead of WPF's
    # `System.Windows.Input.Key`?") do NOT trigger the lint —
    # only actual `open` declarations on Core code do.
    #
    # Verified against current `main`: returns zero matches
    # (the substrate is currently clean per Phase 1 audit
    # 2026-05-09).
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Substrate must not import host-specific types
        run: |
          set -e
          violations=$(grep -rEn '^[[:space:]]*open[[:space:]]+(System\.Windows|PresentationCore|WindowsBase|Microsoft\.Win32)' src/Terminal.Core src/Terminal.Audio --include='*.fs' || true)
          if [ -n "$violations" ]; then
            echo "::error::Portability invariant violated. Substrate code (Terminal.Core / Terminal.Audio) must not import host-specific types per ADR 0001."
            echo "$violations"
            exit 1
          fi
          echo "Portability invariant held: no host-specific imports in substrate."

      # R4b (ADR 0006 R4-enforce, 2026-05-16): the structural
      # gate that "structurally prevents re-leak — the answer
      # to why 51 cycles stayed brittle". The three-layer
      # boundary (transport / pure core / channel) is only real
      # if CI enforces it. ADR 0006 R4 names "no shell strings
      # / no WPF / no P/Invoke" in Terminal.Core. WPF is
      # already covered by the step above. The two below add
      # the P/Invoke ban and the transport-layer
      # (Terminal.Shell) dependency ban. "No shell strings" is
      # enforced *structurally*: with no Terminal.Shell
      # dependency and no P/Invoke, shell-specific executable
      # code/strings cannot live in Terminal.Core. A brittle
      # shell-string-literal grep is deliberately NOT used —
      # Terminal.Core has many legitimate doc-comments
      # discussing cmd / PowerShell behaviour, and a literal
      # grep would false-positive on correct documentation (the
      # too-aggressive-lint failure mode CLAUDE.md warns
      # against). All greps stay anchored like the step above
      # so doc-comment mentions never trigger. P/Invoke is
      # scoped to Terminal.Core only (Terminal.Audio may need
      # native audio interop; ADR 0006 R4 names Terminal.Core).
      - name: Terminal.Core must not use P/Invoke
        run: |
          set -e
          violations=$(grep -rEn '^[[:space:]]*\[<[[:space:]]*DllImport|^[[:space:]]*extern[[:space:]]' src/Terminal.Core --include='*.fs' || true)
          if [ -n "$violations" ]; then
            echo "::error::Portability invariant violated. Terminal.Core (pure session core) must not use P/Invoke per ADR 0006 R4 — native interop belongs in the transport layer."
            echo "$violations"
            exit 1
          fi
          echo "Portability invariant held: no P/Invoke in Terminal.Core."

      - name: Terminal.Core must not depend on the transport layer
        run: |
          set -e
          opens=$(grep -rEn '^[[:space:]]*open[[:space:]]+Terminal\.Shell' src/Terminal.Core --include='*.fs' || true)
          projref=$(grep -nE '<ProjectReference[^>]*Terminal\.Shell' src/Terminal.Core/Terminal.Core.fsproj || true)
          if [ -n "$opens" ] || [ -n "$projref" ]; then
            echo "::error::Portability invariant violated. Terminal.Core (pure session core) must not depend on Terminal.Shell (the transport layer) per ADR 0006 — the dependency direction is Shell -> Core, never Core -> Shell."
            echo "$opens"
            echo "$projref"
            exit 1
          fi
          echo "Portability invariant held: Terminal.Core has no Terminal.Shell dependency."

  workflow-lint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Catches the class of YAML / shell / expression bugs that bit us
    # repeatedly during the Stage 0 release-pipeline diagnostic loop —
    # most notably the PowerShell `@"..."@` heredoc whose body lines
    # were column-0 inside a 10-space-indented `run: |` block, which
    # silently produced a malformed workflow file (workflow runs with
    # 0 jobs spawned and no diagnostic banner). actionlint catches
    # that shape directly.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          # Treat warnings as errors — the things actionlint warns on
          # have all been "actually a bug we missed" in our history.
          fail-on-error: 'true'

  docs-lint:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Informational only — link checks legitimately flake on network
    # and third-party rate limits. Each step uses
    # `continue-on-error: true` so the job stays green and the report
    # is purely advisory; review it periodically rather than blocking
    # PRs on it.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Restrict to docs we author (root + docs/). spec/ contains
      # reference citations to academic and vendor sources that we
      # treat as immutable; we do not want to gate PRs on those URLs
      # being reachable from an unauthenticated runner.
      - name: Lint Markdown links (docs/)
        continue-on-error: true
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc-config.json'
          folder-path: 'docs'
          max-depth: 2

      - name: Lint Markdown links (root)
        continue-on-error: true
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc-config.json'
          file-path: './README.md, ./CONTRIBUTING.md, ./SECURITY.md, ./CODE_OF_CONDUCT.md, ./CHANGELOG.md'
