name: Release

# Triggered when a release is published via the GitHub UI or API.
# Workflow shape and Stage 0 history are documented in
# docs/RELEASE-PROCESS.md; the file's git log is the canonical record
# of how we arrived at this layout (search for "Stage 0 release-pipeline
# diagnostic loop" if you need the story).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Confirm workflow started
        run: |
          echo "Release workflow started"
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Release ID: ${{ github.event.release.id }}"
          echo "Target: ${{ github.event.release.target_commitish }}"

      - name: Validate release target branch
        shell: pwsh
        # Belt-and-suspenders against v0.0.1-preview.14's failure mode:
        # a release accidentally published with target_commitish set to
        # the old Stage 0 branch (claude/create-project-docs-xVA6n)
        # ran an outdated release.yml from that branch and hit the
        # YAML-heredoc bug. Fail loudly here if Target != 'main' so the
        # underlying tag/release can be deleted before the workflow
        # wastes runner minutes building the wrong code.
        run: |
          $target = '${{ github.event.release.target_commitish }}'
          if ($target -ne 'main') {
            Write-Error "Release was published with target_commitish='$target', but releases must target 'main'. Delete the release and the underlying tag, then re-publish with Target=main in the GitHub Releases UI."
            exit 1
          }
          Write-Host "Release target branch is 'main' — OK."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CHANGELOG.md has a matching entry
        shell: pwsh
        # The release-notes step further down silently falls back to a
        # generic "Release X. See CHANGELOG.md for details." body when
        # CHANGELOG.md has no matching `## [<version>]` section. For
        # `v0.0.1-preview.{2..5}` we *almost* shipped that fallback
        # because nobody noticed during a frantic diagnostic loop.
        # Fail-fast here so a missing CHANGELOG section is loud rather
        # than a silently-degraded release.
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          $version = $tag -replace '^v',''
          $escaped = [regex]::Escape($version)
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$escaped\]"
          if (-not ([regex]::Match($content, $pattern).Success)) {
            Write-Error "CHANGELOG.md has no section '## [$version]' matching the release tag. Add one before publishing the release. See docs/RELEASE-PROCESS.md."
            exit 1
          }
          Write-Host "CHANGELOG.md has a section for $version — OK."

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.event.release.tag_name }}' -replace '^v',''
          if ($v -match '-(preview|rc)\.') {
            $prerelease = 'true'
          } else {
            $prerelease = 'false'
          }
          "version=$v"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $v (prerelease=$prerelease)"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish (self-contained win-x64)
        run: dotnet publish src/Terminal.App/Terminal.App.fsproj -c Release -r win-x64 --self-contained -o publish /p:Version=${{ steps.version.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          vpk pack `
            --packId pty-speak `
            --packTitle 'pty-speak' `
            --packAuthors 'pty-speak contributors' `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe Terminal.App.exe `
            --outputDir releases

      - name: Confirm pack completed
        run: |
          echo "Velopack pack completed for tag ${{ github.event.release.tag_name }}"
          dir releases

      - name: Generate release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$version\].*?(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            $body = $match.Value.Trim()
          } else {
            $body = "Release $version. See CHANGELOG.md for details."
          }
          $bannerLines = @(
            "> [!WARNING]",
            "> **Unsigned preview build.** Releases tagged before v0.1.0 are not",
            "> Authenticode-signed and have no Ed25519 manifest signature. Windows",
            "> SmartScreen will warn on first install. Authenticode + Ed25519",
            "> signing return before v0.1.0 — see SECURITY.md.",
            ""
          )
          $banner = ($bannerLines -join "`n") + "`n"
          $body = $banner + $body
          Set-Content -Path release-body.md -Value $body -Encoding UTF8
          Write-Host "Release body written to release-body.md ($($body.Length) chars)"

      - name: Update GitHub Release with body and artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: pty-speak ${{ steps.version.outputs.version }}
          body_path: release-body.md
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          # fail_on_unmatched_files: false — vpk pack only produces a
          # *-delta.nupkg when there's a previous release to diff
          # against, so the delta pattern legitimately matches no files
          # on the very first release. Required artifacts (Setup.exe,
          # full nupkg, releases.json, RELEASES) are always produced
          # by vpk pack; if any of them are missing, the prior vpk
          # pack step would have failed already.
          fail_on_unmatched_files: false
          files: |
            releases/*Setup.exe
            releases/*-full.nupkg
            releases/*-delta.nupkg
            releases/releases.json
            releases/RELEASES
