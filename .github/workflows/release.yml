name: Release

# Triggered when a release is published via the GitHub UI or API.
#
# Bisect of PR #18 changes. v0.0.1-preview.9 silently no-job-spawned,
# meaning one of the constructs PR #18 added breaks workflow load.
# Splitting the suspect range into halves:
#
# THIS HALF: Resolve version, Publish, Install vpk, vpk pack.
# OMITTED HALF: Generate release notes, Update GitHub Release.
#
# If v0.0.1-preview.10 runs, the omitted half is the offender.
# If .10 also silently fails, this half is the offender.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Confirm workflow started
        run: |
          echo "Release workflow started"
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Release ID: ${{ github.event.release.id }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.event.release.tag_name }}' -replace '^v',''
          if ($v -match '-(preview|rc)\.') {
            $prerelease = 'true'
          } else {
            $prerelease = 'false'
          }
          "version=$v"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $v (prerelease=$prerelease)"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish (self-contained win-x64)
        run: dotnet publish src/Terminal.App/Terminal.App.fsproj -c Release -r win-x64 --self-contained -o publish /p:Version=${{ steps.version.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          vpk pack `
            --packId pty-speak `
            --packTitle 'pty-speak' `
            --packAuthors 'pty-speak contributors' `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe Terminal.App.exe `
            --outputDir releases

      - name: Confirm pack completed
        run: |
          echo "Velopack pack completed for tag ${{ github.event.release.tag_name }}"
          dir releases
