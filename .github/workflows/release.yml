name: Release

# Triggered when a release is published via the GitHub UI or API.
# Workflow shape and Stage 0 history are documented in
# docs/RELEASE-PROCESS.md; the file's git log is the canonical record
# of how we arrived at this layout (search for "Stage 0 release-pipeline
# diagnostic loop" if you need the story).
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Confirm workflow started
        run: |
          echo "Release workflow started"
          echo "Tag: ${{ github.event.release.tag_name }}"
          echo "Release ID: ${{ github.event.release.id }}"
          echo "Target: ${{ github.event.release.target_commitish }}"

      - name: Validate release target branch
        shell: pwsh
        # Belt-and-suspenders against v0.0.1-preview.14's failure mode:
        # a release accidentally published with target_commitish set to
        # the old Stage 0 branch (claude/create-project-docs-xVA6n)
        # ran an outdated release.yml from that branch and hit the
        # YAML-heredoc bug. Fail loudly here if Target != 'main' so the
        # underlying tag/release can be deleted before the workflow
        # wastes runner minutes building the wrong code.
        run: |
          $target = '${{ github.event.release.target_commitish }}'
          if ($target -ne 'main') {
            Write-Error "Release was published with target_commitish='$target', but releases must target 'main'. Delete the release and the underlying tag, then re-publish with Target=main in the GitHub Releases UI."
            exit 1
          }
          Write-Host "Release target branch is 'main' — OK."

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = '${{ github.event.release.tag_name }}' -replace '^v',''
          if ($v -match '-(preview|rc)\.') {
            $prerelease = 'true'
          } else {
            $prerelease = 'false'
          }
          "version=$v"            | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $v (prerelease=$prerelease)"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish (self-contained win-x64)
        run: dotnet publish src/Terminal.App/Terminal.App.fsproj -c Release -r win-x64 --self-contained -o publish /p:Version=${{ steps.version.outputs.version }}

      - name: Cache Velopack CLI global install
        # Audit-cycle PR-E. Mirrors the cache strategy in
        # ci.yml's build job: caches `~/.dotnet/tools` so vpk
        # doesn't re-download on every release run. The cache
        # is shared across both workflows by using the same
        # key. Bump v1 → v2 when we want to force-pull a new
        # vpk version.
        id: cache-vpk
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-vpk-v1

      - name: Install Velopack CLI
        if: steps.cache-vpk.outputs.cache-hit != 'true'
        run: dotnet tool install -g vpk

      - name: Fetch prior release full nupkg for delta generation
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Velopack's `vpk pack` only generates a *-delta.nupkg when a
        # prior *-full.nupkg for the same packId exists in --outputDir
        # at pack time. CI starts from a fresh runner each release, so
        # without this step the releases/ directory is empty and every
        # build ships full-only — auto-update clients fall back to
        # downloading the entire ~66 MB package every time.
        #
        # Walk through GitHub Releases in published-descending order
        # until we find one that has a `*-full.nupkg` asset, then
        # download it. The walk-back skips "burned" releases: tags
        # whose workflow run failed before producing artifacts, so
        # the release exists on GitHub but has no nupkg attached.
        # `v0.0.1-preview.{14, 23, 24}` were all burned this way at
        # various points in this project's history; without the
        # walk-back, the next release after a burned tag fails this
        # step trying to download a nonexistent asset.
        #
        # Skips silently with a "no prior nupkg anywhere" message
        # if no release in the history has the asset (legitimate
        # first release on a channel).
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          $currentTag = '${{ github.event.release.tag_name }}'
          $candidates = gh release list --limit 100 --json tagName,publishedAt `
            | ConvertFrom-Json `
            | Where-Object { $_.tagName -ne $currentTag } `
            | Sort-Object publishedAt -Descending
          $priorTag = $null
          foreach ($candidate in $candidates) {
            $tag = $candidate.tagName
            Write-Host "Checking $tag for *-full.nupkg..."
            $assets = gh release view $tag --json assets --jq '[.assets[].name]' 2>$null `
              | ConvertFrom-Json
            if ($assets -and ($assets | Where-Object { $_ -match '-full\.nupkg$' })) {
              $priorTag = $tag
              Write-Host "  Found *-full.nupkg in $tag."
              break
            } else {
              Write-Host "  $tag has no *-full.nupkg (likely a burned tag); skipping."
            }
          }
          if (-not $priorTag) {
            Write-Host 'No prior release in history has a *-full.nupkg. vpk pack will produce a full nupkg only (no delta).'
          } else {
            Write-Host "Downloading *-full.nupkg from $priorTag for delta generation."
            gh release download $priorTag --pattern '*-full.nupkg' --dir releases --clobber
            Write-Host 'Prior nupkg present:'
            Get-ChildItem -Path releases -Filter '*-full.nupkg' | Format-Table Name, Length
          }

      - name: Pack with Velopack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          vpk pack `
            --packId pty-speak `
            --packTitle 'pty-speak' `
            --packAuthors 'pty-speak contributors' `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe Terminal.App.exe `
            --outputDir releases

      - name: Confirm pack completed
        run: |
          echo "Velopack pack completed for tag ${{ github.event.release.tag_name }}"
          dir releases

      - name: Remove prior-release artifacts staged for delta generation
        shell: pwsh
        # The "Fetch prior release full nupkg for delta generation"
        # step earlier dropped the previous version's *-full.nupkg
        # into releases/ so vpk pack could diff against it. vpk pack
        # leaves it there. softprops/action-gh-release would then
        # upload it as a duplicate asset on the current release.
        # Remove versioned nupkgs that don't match the current
        # version. Non-versioned files (Setup.exe, RELEASES,
        # releases.<channel>.json, assets.<channel>.json) are
        # overwritten by vpk pack so don't need cleanup.
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          $fullPattern  = "*-$ver-full.nupkg"
          $deltaPattern = "*-$ver-delta.nupkg"
          $stale = Get-ChildItem -Path releases -File `
            | Where-Object {
                ($_.Name -like '*-full.nupkg' -and $_.Name -notlike $fullPattern) -or
                ($_.Name -like '*-delta.nupkg' -and $_.Name -notlike $deltaPattern)
              }
          if ($stale) {
            Write-Host 'Removing stale prior-version nupkgs:'
            $stale | Format-Table Name, Length
            $stale | Remove-Item -Force
          } else {
            Write-Host 'No stale prior-version nupkgs to remove.'
          }
          Write-Host 'releases/ after cleanup:'
          Get-ChildItem -Path releases | Format-Table Name, Length

      - name: Verify required Velopack artifacts exist
        shell: pwsh
        # Defense-in-depth on top of `vpk pack`'s own exit code: if a
        # future Velopack version renames or moves an artifact (e.g.
        # Setup.exe → installer.exe), softprops/action-gh-release with
        # fail_on_unmatched_files=false would silently upload nothing
        # and the release would ship without the file the auto-update
        # client expects. Fail the workflow loudly here instead.
        #
        # Required artifacts (per Velopack's vpk pack docs):
        #   * <id>-Setup.exe         — Windows installer
        #   * <id>-<ver>-full.nupkg  — full update package
        #   * releases.<channel>.json — releases index for auto-update
        #   * assets.<channel>.json   — asset manifest used by deployment
        # The channel suffix is Velopack's runtime identifier (we get
        # "win" by default since we don't pass `--channel`); use a glob
        # so this stays robust if we add channel routing later.
        #
        # Optional / not asserted:
        #   * <id>-<ver>-delta.nupkg — only when a prior release exists
        #     to diff against; v0.0.1-preview.18 (the first release
        #     since CI was overhauled) had no prior release so no delta
        #     was produced. Asserting it would fail the first release
        #     after every channel change.
        #   * RELEASES — legacy Squirrel-migration index; vpk produces
        #     it for back-compat but new clients use releases.*.json.
        #   * <id>-Portable.zip — opt-in flag we don't pass.
        #
        # Background: this gate was scoped to *Setup.exe + *-full.nupkg
        # in PR #41, missing the manifest gap. v0.0.1-preview.18 shipped
        # WITHOUT releases.win.json or assets.win.json because the
        # softprops upload pattern was the literal `releases.json`
        # (no channel) which didn't match Velopack's channel-suffixed
        # output. Asserting them here closes the loop.
        run: |
          $required = @(
            '*Setup.exe',
            '*-full.nupkg',
            'releases.*.json',
            'assets.*.json'
          )
          $missing = @()
          foreach ($pattern in $required) {
            # Avoid the $matches automatic variable name — `Get-ChildItem`
            # results live in $found, freeing $matches for any future
            # -match operator the script might use.
            $found = Get-ChildItem -Path releases -Filter $pattern -ErrorAction SilentlyContinue
            if ($found.Count -eq 0) {
              $missing += $pattern
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Velopack pack did not produce required artifact(s) in releases/: $($missing -join ', '). Inspect the previous step's `dir releases` output and check whether vpk pack flags or output paths changed (Velopack's channel-suffix convention is documented at https://docs.velopack.io/packaging/overview)."
            exit 1
          }
          Write-Host "Required Velopack artifacts present: $($required -join ', ')"

      - name: Generate release notes from CHANGELOG.md
        shell: pwsh
        # Resolution order:
        #   1. If a per-version section '## [<version>]' exists, use it.
        #   2. Otherwise, if '## [Unreleased]' has non-empty content,
        #      use it and rewrite the heading to '## [<version>] — <today>'
        #      so the release body reads naturally.
        #   3. Otherwise, fall back to a generic "Release X. See
        #      CHANGELOG.md for details." body.
        # The pre-build CHANGELOG-matching gate that used to enforce (1)
        # was removed in favour of this fallback so a maintainer can
        # publish a release directly off [Unreleased] without burning a
        # tag if they forget to rename the section first. See
        # docs/RELEASE-PROCESS.md "Cutting a release".
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw

          $versionPattern = "(?ms)^## \[$version\].*?(?=^## \[|\z)"
          $versionMatch = [regex]::Match($content, $versionPattern)

          if ($versionMatch.Success) {
            $body = $versionMatch.Value.Trim()
            Write-Host "Using '## [$version]' section from CHANGELOG.md."
          } else {
            $unreleasedPattern = "(?ms)^## \[Unreleased\](.*?)(?=^## \[|\z)"
            $unreleasedMatch = [regex]::Match($content, $unreleasedPattern)
            $unreleasedBody = if ($unreleasedMatch.Success) { $unreleasedMatch.Groups[1].Value.Trim() } else { "" }

            if ($unreleasedBody.Length -gt 0) {
              $today = (Get-Date -Format "yyyy-MM-dd")
              $body = "## [$version] — $today`n`n$unreleasedBody"
              Write-Host "Using [Unreleased] section from CHANGELOG.md (no per-version section found); rewrote heading to '## [$version] — $today' for the release body."
            } else {
              $body = "Release $version. See CHANGELOG.md for details."
              Write-Warning "Neither '## [$version]' nor a non-empty '## [Unreleased]' section found in CHANGELOG.md; using generic fallback body."
            }
          }
          $bannerLines = @(
            "> [!WARNING]",
            "> **Unsigned preview build.** Releases tagged before v0.1.0 are not",
            "> Authenticode-signed and have no Ed25519 manifest signature. Windows",
            "> SmartScreen will warn on first install. Authenticode + Ed25519",
            "> signing return before v0.1.0 — see SECURITY.md.",
            ""
          )
          $banner = ($bannerLines -join "`n") + "`n"
          $body = $banner + $body
          Set-Content -Path release-body.md -Value $body -Encoding UTF8
          Write-Host "Release body written to release-body.md ($($body.Length) chars)"

      - name: Update GitHub Release with body and artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: pty-speak ${{ steps.version.outputs.version }}
          body_path: release-body.md
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          # fail_on_unmatched_files: false — vpk pack only produces a
          # *-delta.nupkg when there's a previous release to diff
          # against, so the delta pattern legitimately matches no files
          # on the very first release after a channel change. The
          # earlier "Verify required Velopack artifacts exist" step
          # asserts the non-optional patterns (*Setup.exe, *-full.nupkg,
          # releases.*.json, assets.*.json) BEFORE this upload runs,
          # so a silent skip here only ever drops genuinely-optional
          # artifacts.
          #
          # File-naming notes (see https://docs.velopack.io/packaging/overview):
          # vpk pack writes channel-suffixed manifests like
          # releases.win.json / assets.win.json — the literal
          # "releases.json" pattern used pre-fix didn't match those,
          # which is why v0.0.1-preview.18 shipped without them. The
          # globs below are channel-agnostic.
          fail_on_unmatched_files: false
          files: |
            releases/*Setup.exe
            releases/*-full.nupkg
            releases/*-delta.nupkg
            releases/releases.*.json
            releases/assets.*.json
            releases/RELEASES
